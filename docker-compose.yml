services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: subscriptions
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d subscriptions"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://app:app@postgres:5432/subscriptions?sslmode=disable
      HTTP_ADDR: ":8080"
      LOG_LEVEL: info
      LOG_FORMAT: text
      MIGRATIONS_PATH: file://migrations
      DB_CONNECT_RETRIES: "60"
      DB_CONNECT_RETRY_WAIT: 1s
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
