host: localhost:8080
info:
  contact:
    name: Support
  description: CRUDL for user subscriptions and monthly cost aggregation (PostgreSQL).
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Subscriptions REST API
  version: "1.0"
paths:
  /subscriptions:
    get:
      description: Optional filters by user_id and exact service_name; pagination
        via limit/offset
      parameters:
      - description: User UUID
        in: query
        name: user_id
        type: string
      - description: Exact service name
        in: query
        name: service_name
        type: string
      - description: Page size (default 50, max 500)
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_wassiliy_subscriptions-service_internal_domain.Subscription'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.errResp'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.errResp'
      summary: List subscriptions
      tags:
      - subscriptions
    post:
      consumes:
      - application/json
      description: Creates a new subscription record
      parameters:
      - description: Payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_wassiliy_subscriptions-service_internal_domain.CreateSubscription'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_wassiliy_subscriptions-service_internal_domain.Subscription'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.errResp'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.errResp'
      summary: Create subscription
      tags:
      - subscriptions
  /subscriptions/{id}:
    delete:
      parameters:
      - description: Subscription UUID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.errResp'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.errResp'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.errResp'
      summary: Delete subscription
      tags:
      - subscriptions
    get:
      parameters:
      - description: Subscription UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_wassiliy_subscriptions-service_internal_domain.Subscription'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.errResp'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.errResp'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.errResp'
      summary: Get subscription by ID
      tags:
      - subscriptions
    put:
      consumes:
      - application/json
      parameters:
      - description: Subscription UUID
        in: path
        name: id
        required: true
        type: string
      - description: Payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_wassiliy_subscriptions-service_internal_domain.CreateSubscription'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_wassiliy_subscriptions-service_internal_domain.Subscription'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.errResp'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.errResp'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.errResp'
      summary: Update subscription
      tags:
      - subscriptions
  /subscriptions/cost:
    get:
      description: Sums monthly price for each calendar month in [from, to] where
        a subscription is active. Optional filters.
      parameters:
      - description: Start month MM-YYYY
        in: query
        name: from
        required: true
        type: string
      - description: End month MM-YYYY
        in: query
        name: to
        required: true
        type: string
      - description: User UUID
        in: query
        name: user_id
        type: string
      - description: Exact service name
        in: query
        name: service_name
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_wassiliy_subscriptions-service_internal_domain.CostReport'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.errResp'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.errResp'
      summary: Total subscription cost for period
      tags:
      - subscriptions
swagger: "2.0"
